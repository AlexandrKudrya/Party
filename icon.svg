<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1838"/>
      <stop offset="100%" stop-color="#0d0a1a"/>
    </linearGradient>
    <linearGradient id="flame1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ff4da6"/>
      <stop offset="55%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffde59"/>
    </linearGradient>
    <linearGradient id="flame2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a259ff"/>
      <stop offset="100%" stop-color="#ff4da6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer flame -->
  <path d="M256 80
    C256 80 195 150 190 210
    C185 255 160 265 155 310
    C148 370 178 430 256 440
    C334 430 364 370 357 310
    C352 265 327 255 322 210
    C317 150 256 80 256 80Z"
    fill="url(#flame1)" filter="url(#glow)"/>

  <!-- Inner flame -->
  <path d="M256 185
    C256 185 225 230 222 268
    C219 295 205 308 204 338
    C202 375 224 405 256 408
    C288 405 310 375 308 338
    C307 308 293 295 290 268
    C287 230 256 185 256 185Z"
    fill="url(#flame2)" opacity="0.9"/>

  <!-- Sparkle top-left -->
  <g filter="url(#glow)">
    <circle cx="155" cy="185" r="9" fill="#ffde59" opacity="0.9"/>
    <line x1="155" y1="170" x2="155" y2="200" stroke="#ffde59" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="140" y1="185" x2="170" y2="185" stroke="#ffde59" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Sparkle top-right -->
  <g filter="url(#glow)">
    <circle cx="360" cy="165" r="7" fill="#ff4da6" opacity="0.9"/>
    <line x1="360" y1="152" x2="360" y2="178" stroke="#ff4da6" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="347" y1="165" x2="373" y2="165" stroke="#ff4da6" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Sparkle bottom-left -->
  <circle cx="138" cy="345" r="6" fill="#a259ff" opacity="0.8"/>

  <!-- Sparkle right -->
  <circle cx="378" cy="310" r="5" fill="#ffde59" opacity="0.7"/>

  <!-- Small dots -->
  <circle cx="195" cy="130" r="4" fill="#ff4da6" opacity="0.6"/>
  <circle cx="325" cy="118" r="3" fill="#a259ff" opacity="0.6"/>
  <circle cx="385" cy="240" r="4" fill="#ffde59" opacity="0.5"/>
</svg>
